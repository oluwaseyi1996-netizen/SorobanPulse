apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soroban-pulse.fullname" . }}-secrets
  labels:
    {{- include "soroban-pulse.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.apiKey }}
  API_KEY: {{ .Values.secrets.apiKey | quote }}
  {{- end }}

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost/soroban_pulse_test

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  validate-sdk:
    name: Validate SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: make generate-sdk
      - name: Check for diffs
        run: |
          if [ -n "$(git status --porcelain sdk/)" ]; then
            echo "SDKs are out of date. Please run 'make generate-sdk' and commit the changes."
            git status --porcelain sdk/
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: sudo apt-get install -y libpq-dev pkg-config libssl-dev
      - run: cargo test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: sudo apt-get install -y libpq-dev pkg-config libssl-dev
      - run: cargo test --test integration_tests

  bench:
    name: Bench (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo bench

  fuzz:
    name: Fuzz (30s smoke run)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fuzz-
      - run: cargo install cargo-fuzz
      - run: cargo fuzz run fuzz_validate_contract_id -- -max_total_time=30
        working-directory: fuzz
      - run: cargo fuzz run fuzz_validate_tx_hash -- -max_total_time=30
        working-directory: fuzz
      - run: cargo fuzz run fuzz_pagination_params -- -max_total_time=30
        working-directory: fuzz

  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-
      - run: sudo apt-get install -y pkg-config libssl-dev
      - run: cargo build --release

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, integration-tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  openapi:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: sudo apt-get install -y pkg-config libssl-dev
      # Build the spec-dump binary and generate the spec
      - run: cargo build --bin dump_openapi
      - run: ./target/debug/dump_openapi > /tmp/openapi-generated.json
      # Validate the generated spec against OpenAPI 3.0 schema using spectral@6.11.1
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6.11.1
      - name: Validate OpenAPI spec
        run: spectral lint /tmp/openapi-generated.json --ruleset https://unpkg.com/@stoplight/spectral-openapi/dist/ruleset.js
      # Verify the committed docs/openapi.json matches the generated spec
      - name: Check committed spec is up to date
        run: |
          ./target/debug/dump_openapi > /tmp/openapi-fresh.json
          if ! diff -q docs/openapi.json /tmp/openapi-fresh.json > /dev/null 2>&1; then
            echo "docs/openapi.json is out of date. Run './target/debug/dump_openapi > docs/openapi.json' and commit the result."
            diff docs/openapi.json /tmp/openapi-fresh.json
            exit 1
          fi
          echo "docs/openapi.json is up to date."
